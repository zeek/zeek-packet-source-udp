name: Build

permissions:
  contents: read

on:
  pull_request:
  push:
    branches: [main]

jobs:
  pre-commit:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false
    - name: Build
      run: docker build -f ./Dockerfile .


